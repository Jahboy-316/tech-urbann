<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Moon+Dance&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/output.css">
    <title>blog</title>
</head>

<body>
    <header class=" bg-black font-roboto flex justify-between items-center relative z-20 px-6 md:pb-12 pt-6">
        <div class="w-16">
            <img src="images-icons/logo.png">
        </div>
        <nav class="hidden md:flex text-[16px] text-white justify-between gap-16">
            <a href="#">Home</a>
            <a href="#">Gallery</a>
            <a href="blog.html">Blog</a>
            <a href="#">Contact us</a>
        </nav>
        <button id="menuBtn" class="text-white text-3xl md:hidden">
            ☰
        </button>

        <div class=" hidden md:block">
            <button class="text-bluesome rounded-3xl bg-yellowsome w-28 font-medium p-1">Register</button>
        </div>
    </header>
    <div id="mobileMenu" class="hidden bg-black text-white  flex flex-col items-center gap-6 py-8 md:hidden">

        <a href="#">Home</a>
        <a href="#">Gallery</a>
        <a href="blog.html">Blog</a>
        <a href="#">Contact Us</a>

    </div>

    <section class="py-20 px-16">

        <h1 class="font-baloo text-6xl text-bluesome font-bold text-center">
            Latest Blog Posts
        </h1>

        <div id="postsContainer" class="grid grid-cols-1 md:grid-cols-3 gap-10 mt-16">

        </div>

    </section>

    <footer class="bg-black py-10 px-6 md:px-16">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center md:items-start gap-8">

            <div class="flex flex-col items-center md:items-start text-center md:text-left">
                <div class="flex items-center gap-3">
                    <img class="w-10 md:w-16" src="images-icons/logo.png" alt="Tech Urban Logo">
                    <h1 class="text-3xl md:text-5xl font-baloo font-bold text-white">tech urban</h1>
                </div>
                <p class="text-base md:text-lg font-montserrat mt-2 md:ml-16 text-yellowsome">
                    Connect. Innovate. Grow
                </p>
            </div>

            <div class="flex flex-col items-center md:items-end text-center md:text-right">

                <div
                    class="flex flex-wrap justify-center md:justify-end gap-x-6 gap-y-2 text-white font-montserrat text-sm md:text-base">
                    <a href="#" class="hover:text-yellowsome transition-colors">Home</a>
                    <a href="#" class="hover:text-yellowsome transition-colors">Gallery</a>
                    <a href="blog.html" class="hover:text-yellowsome transition-colors">Blog</a>
                    <a href="#" class="hover:text-yellowsome transition-colors">Contact Us</a>
                </div>

                <div class="flex gap-4 mt-6">
                    <img class="w-6 h-6 invert grayscale brightness-50 hover:brightness-100 transition"
                        src="images-icons/youtubeicon2.png" alt="YouTube">
                    <img class="w-6 h-6 invert grayscale brightness-50 hover:brightness-100 transition"
                        src="images-icons/facebookicon.png" alt="Facebook">
                    <img class="w-6 h-6 invert grayscale brightness-50 hover:brightness-100 transition"
                        src="images-icons/twittericon.png" alt="Twitter">
                    <img class="w-6 h-6 invert grayscale brightness-50 hover:brightness-100 transition"
                        src="images-icons/instagramicon.png" alt="Instagram">
                    <img class="w-6 h-6 invert grayscale brightness-50 hover:brightness-100 transition"
                        src="images-icons/linkedinicon.png" alt="LinkedIn">
                </div>

            </div>

        </div>

        <div class="border-t border-gray-800 my-8"></div>

        <div class="text-center">
            <p class="text-xs md:text-sm font-montserrat text-gray-400">
                © 2023 Tech Urban Conference. All rights reserved.
            </p>
        </div>
    </footer>

    <script src="script.js" defer></script>
    <script src="app.js" defer></script>
</body>

</html>
